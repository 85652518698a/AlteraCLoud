project_id = "rxuvbelspavlgtexznjq"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 15

[db.pooler]
enabled = true
pool_mode = "transaction"
default_pool_size = 15
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = ["./migrations/0001_init.sql"]

[analytics]
enabled = true
port = 54327
backend = "postgres"

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2

[functions.create-share-token]
verify_jwt = false

[functions.resolve-share-token]
verify_jwt = false

[auth]
enabled = true
site_url = "https://altera-cloud.vercel.app"
additional_redirect_urls = ["https://*.vercel.app"]
jwt_expiry = 3600
enable_signup = true
enable_refresh_token_rotation = true
minimum_password_length = 6

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"
