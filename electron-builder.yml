appId: space.alteracloud.app
productName: Altera Cloud
copyright: Copyright © 2026 Altera Cloud

directories:
  output: release
  buildResources: public

files:
  - dist/**/*
  - electron/**/*.cjs

win:
  artifactName: "${productName}.Setup.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

linux:
  artifactName: "${productName}.${ext}"
  target:
    - AppImage
    - deb
  icon: electron/icon.png

mac:
  artifactName: "${productName}.${ext}"
  target:
    - dmg
    - zip
  icon: electron/icon.png
