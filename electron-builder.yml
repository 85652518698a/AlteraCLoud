appId: space.alteracloud.app
productName: Altera Cloud
copyright: Copyright © 2026 Altera Cloud

directories:
  output: release
  buildResources: public

files:
  - dist/**/*
  - electron/**/*.cjs

publish:
  provider: github
  owner: 85652518698a
  repo: AlteraCLoud
  releaseType: release

win:
  artifactName: "${productName}.Setup.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Altera Cloud

linux:
  artifactName: "${productName}.${ext}"
  target:
    - AppImage
    - deb
  icon: electron/icon.png
  category: Education

mac:
  artifactName: "${productName}.${ext}"
  target:
    - dmg
    - zip
  icon: electron/icon-512.png
  category: public.app-category.education
