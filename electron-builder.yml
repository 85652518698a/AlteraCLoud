appId: space.alteracloud.app
productName: Altera Cloud
copyright: Copyright © 2026 Altera Cloud

directories:
  output: release
  buildResources: public

files:
  - dist/**/*
  - electron/**/*.cjs

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

linux:
  target:
    - AppImage
    - deb

mac:
  target:
    - dmg
    - zip
